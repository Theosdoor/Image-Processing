program: scripts/sweep_main.py
method: bayes
metric:
  name: accuracy
  goal: maximize
parameters:
  corner_quality:
    min: 0.01
    max: 0.1
  border_width:
    values: [0, 2, 4]
  patch_size:
    values: [7, 9, 11]
  dilation_size:
    values: [3, 4, 5]
  gamma:
    min: 0.7
    max: 1.0
  clahe_clip_limit:
    min: 1.5
    max: 4.0
  tile_grid_size:
    values: [4, 8, 16]
  apply_colour_contrast:
    values: [true, false]
